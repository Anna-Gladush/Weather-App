<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
  <title>Weather App</title>
</head>
<body>
  <header> 
    <div class="city">
      <img src="./assets/icons/map.svg" alt="map-icon" width="25px">
      <p id="city">Honolulu, US</p>
    </div>
    <div class="button-metric">
      <button class="active">°C</button>
      <button class="not-active">°F</button>
    </div>
    <div class="search">
      <input type="text" placeholder="Search City" id="search-city">
      <button class="submit"></button>
    </div>
  </header>
  <main>
    <div class="weather">
      <div class="today">
        <div class="day">
        </div>
        <div class="illustration"></div>
      </div>
      <div class="forecast"></div>
    </div>
  </main>
